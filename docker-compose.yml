version: '3.8'

services:
  ### PHP-FPM Service ###
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: symfony_php
    working_dir: /app
    volumes:
      - .:/app
    environment:
      APP_ENV: prod
      APP_DEBUG: 0
      DATABASE_URL: "sqlite:///var/data/data.db"
      UPLOADS_DIR: "/app/public/uploads"
    expose:
      - "9000"

  ### Nginx Service ###
  nginx:
    image: nginx:latest
    container_name: symfony_nginx
    ports:
      - "80:80"
    volumes:
      - .:/app
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
